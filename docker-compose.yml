services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muslim_hebat}
      POSTGRES_USER: ${POSTGRES_USER:-muslim_hebat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muslim_hebat} -d ${POSTGRES_DB:-muslim_hebat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-muslim_hebat}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-muslim_hebat}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muslim_hebat}
      POSTGRES_USER: ${POSTGRES_USER:-muslim_hebat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_HOST: postgres
      BACKUP_DIR: /backups
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    environment:
      URL: ${MONITOR_URL:-http://web}
      ALERT_WEBHOOK: ${ALERT_WEBHOOK:-}
      TIMEOUT: ${MONITOR_TIMEOUT:-10}
      LABEL: ${MONITOR_LABEL:-muslim-hebat}
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backup_data:
