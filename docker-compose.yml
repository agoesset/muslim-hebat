services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muslim_hebat}
      POSTGRES_USER: ${POSTGRES_USER:-muslim_hebat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muslim_hebat} -d ${POSTGRES_DB:-muslim_hebat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-muslim_hebat}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-muslim_hebat}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
